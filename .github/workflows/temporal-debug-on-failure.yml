name: Temporal Debug on Failed Build

on:
  workflow_run:
    workflows: ["*"]
    types:
      - completed

jobs:
  temporal-debug:
    name: Temporal Debug Analysis
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ github.event.workflow_run.head_repository.full_name }}
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract failure context
        id: context
        run: |
          RUN_ID=${{ github.event.workflow_run.id }}
          REPO=${{ github.event.workflow_run.head_repository.full_name }}
          SHA=${{ github.event.workflow_run.head_sha }}
          BRANCH=${{ github.event.workflow_run.head_branch }}
          TIMESTAMP=$(date -u -d "${{ github.event.workflow_run.created_at }}" +"%Y-%m-%d %H:%M:%S UTC")

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Create temporal debug worktree
        id: worktree
        run: |
          TARGET_COMMIT=${{ steps.context.outputs.sha }}
          WORKTREE_PATH=$(mktemp -d -t temporal-debug-XXXXXX)
          git worktree add "$WORKTREE_PATH" "$TARGET_COMMIT"
          echo "worktree_path=$WORKTREE_PATH" >> $GITHUB_OUTPUT

      - name: Analyze historical code at failure point
        id: analysis
        run: |
          WORKTREE=${{ steps.worktree.outputs.worktree_path }}
          SHA=${{ steps.context.outputs.sha }}

          echo "analysis<<EOF" >> $GITHUB_OUTPUT
          echo "## 🕐 Temporal Debug Analysis" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Failed Run:** ${{ github.event.workflow_run.html_url }}" >> $GITHUB_OUTPUT
          echo "**Commit:** \`$SHA\`" >> $GITHUB_OUTPUT
          echo "**Branch:** \`${{ steps.context.outputs.branch }}\`" >> $GITHUB_OUTPUT
          echo "**Timestamp:** ${{ steps.context.outputs.timestamp }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Historical Code State" >> $GITHUB_OUTPUT
          echo "Code at failure commit \`$SHA\` has been checked out to an isolated worktree." >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### Next Steps" >> $GITHUB_OUTPUT
          echo "1. Review the failed run logs above" >> $GITHUB_OUTPUT
          echo "2. Ask your agent: \"Debug the failure at commit $SHA - here's the error log: <paste logs>\"" >> $GITHUB_OUTPUT
          echo "3. Agent will use temporal-debug skill to analyze historical code" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post analysis as PR comment
        if: ${{ github.event.workflow_run.pull_requests[0].number }}
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ github.event.workflow_run.pull_requests[0].number }};
            const analysis = `${{ steps.analysis.outputs.analysis }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: analysis
            });

      - name: Create issue if no PR
        if: ${{ github.event.workflow_run.pull_requests[0].number == null }}
        uses: actions/github-script@v7
        with:
          script: |
            const analysis = `${{ steps.analysis.outputs.analysis }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🕐 Temporal Debug: Failed build at ${{ steps.context.outputs.sha }}`,
              body: analysis,
              labels: ['temporal-debug', 'ci-failure']
            });

      - name: Cleanup worktree
        if: always()
        run: |
          WORKTREE=${{ steps.worktree.outputs.worktree_path }}
          git worktree remove --force "$WORKTREE"
          git worktree prune